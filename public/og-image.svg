  <text x="100" y="470" fill="#94A3B8" font-size="28" font-family="system-ui, -apple-system, Segoe UI, sans-serif">@cakowebber • github.com/ckzwebber • Criciúma, SC, Brasil</text>
  <text x="100" y="540" fill="#64748B" font-size="24" font-family="system-ui, -apple-system, Segoe UI, sans-serif">webberportfolio.netlify.app</text>
