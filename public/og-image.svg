<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Carlos Miguel Backend Developer</title>
  <desc id="desc">Portfolio of Carlos Miguel Webber Model, Backend Developer specialized in Node.js, NestJS, TypeScript and PostgreSQL.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="140" x2="1040" y2="490" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" />
      <stop offset="1" stop-color="#3B82F6" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="60" y="60" width="1080" height="510" rx="20" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6" />

  <text x="100" y="210" fill="#E2E8F0" font-size="34" font-family="system-ui, -apple-system, Segoe UI, sans-serif" letter-spacing="0.18em">CARLOS MIGUEL WEBBER MODEL</text>
